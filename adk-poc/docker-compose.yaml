services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: skills
      POSTGRES_USER: skills
      POSTGRES_PASSWORD: skills
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  pgdata:
